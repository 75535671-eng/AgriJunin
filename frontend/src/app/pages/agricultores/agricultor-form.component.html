<div class="form-page">
  <h2>{{ isEdit() ? 'Editar' : 'Nuevo' }} agricultor</h2>
  @if (error()) { <div class="alert alert--error">{{ error() }}</div> }

  <form [formGroup]="form" (ngSubmit)="submit()" class="card form-card">
    <div class="form-grid form-grid--fields">
      <div class="form-group">
        <label>ID Usuario *</label>
        <input type="number" formControlName="usuario_id" [class.invalid]="isInvalid('usuario_id')" />
      </div>
      <div class="form-group">
        <label>DNI (8 dígitos) *</label>
        <input formControlName="dni" [class.invalid]="isInvalid('dni')" />
      </div>
      <div class="form-group">
        <label>Nombres *</label>
        <input formControlName="nombres" [class.invalid]="isInvalid('nombres')" />
      </div>
      <div class="form-group">
        <label>Apellidos *</label>
        <input formControlName="apellidos" [class.invalid]="isInvalid('apellidos')" />
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input formControlName="telefono" />
      </div>
      <div class="form-group">
        <label>Email contacto</label>
        <input formControlName="email_contacto" />
      </div>
      <div class="form-group">
        <label>Distrito *</label>
        <input formControlName="distrito" />
      </div>
      <div class="form-group">
        <label>Hectáreas totales</label>
        <input type="number" step="0.01" formControlName="hectareas_totales" />
      </div>
      <div class="form-group">
        <label>Fecha registro *</label>
        <input type="date" formControlName="fecha_registro" />
      </div>
      <div class="form-group full">
        <label>Dirección</label>
        <textarea formControlName="direccion" rows="2"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <a routerLink="/agricultores" class="btn btn--outline">Cancelar</a>
      <button type="submit" class="btn btn--primary" [disabled]="loading()">
        {{ loading() ? 'Guardando...' : 'Guardar' }}
      </button>
    </div>
  </form>
</div>
