<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-card__header">
      <span class="auth-card__logo">🌱</span>
      <h1>Crear cuenta</h1>
      <p>Únase al sistema de agricultura inteligente</p>
    </div>

    @if (error()) {
      <div class="alert alert--error">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Nombre completo</label>
        <input formControlName="nombre" [class.invalid]="isInvalid('nombre')" />
      </div>
      <div class="form-group">
        <label>Correo</label>
        <input type="email" formControlName="email" [class.invalid]="isInvalid('email')" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" formControlName="password" [class.invalid]="isInvalid('password')" />
        @if (form.get('password')?.errors?.['strength']) {
          <span class="error-msg">Debe incluir mayúscula, minúscula y número</span>
        }
      </div>
      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" formControlName="confirmPassword" [class.invalid]="form.errors?.['mismatch'] && form.get('confirmPassword')?.touched" />
      </div>
      <div class="form-group">
        <label>Rol</label>
        <select formControlName="rol">
          <option value="agricultor">Agricultor</option>
          <option value="tecnico">Técnico</option>
        </select>
      </div>
      <button type="submit" class="btn btn--primary auth-card__submit" [disabled]="loading()">
        {{ loading() ? 'Registrando...' : 'Registrarse' }}
      </button>
    </form>
    <p class="auth-card__footer">
      ¿Ya tiene cuenta? <a routerLink="/auth/login">Iniciar sesión</a>
    </p>
  </div>
</div>
